<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Safety Orange background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#E84B00"/>

  <!--
    Bold white "P" for Partner.
    Outer path  = full P silhouette (stem + bowl).
    Inner path  = counter (hole in bowl).
    fill-rule="evenodd" subtracts the inner from the outer.

    Outer:  M8 4 → right 9 → arc r=7 down 14 → left 4 → down 10 → left 5 → close
    Inner:  M13 7 → right 4 → arc r=4 down 8 → left 4 → close
  -->
  <path
    fill-rule="evenodd"
    fill="white"
    d="M8 4h9a7 7 0 0 1 0 14h-4v10H8z M13 7h4a4 4 0 0 1 0 8h-4z"
  />
</svg>
